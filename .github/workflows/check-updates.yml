name: Check for new documents
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run scraper
        run: python scraper.py
      - name: Commit updated data
        run: |
          git config user.name "doc-monitor-bot"
          git config user.email "actions@github.com"
          git add state/seen.json data/findings.json data/last_run.json
          git diff --staged --quiet || git commit -m "Update document tracking data [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "retrying..."
            sleep 5
          done
